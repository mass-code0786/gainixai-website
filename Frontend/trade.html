<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAINIX AI - Trading</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- TradingView Library -->
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #03050a;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,255,209,0.1);
            border: 1px solid rgba(0,255,209,0.2);
            border-radius: 30px;
            padding: 8px 18px;
            color: #00ffd9;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0,255,209,0.2);
            transform: translateX(-4px);
        }

        .trading-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .chart-container {
            background: rgba(12,18,28,0.95);
            border: 1px solid rgba(0,255,209,0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .trading-panel {
            background: rgba(12,18,28,0.95);
            border: 1px solid rgba(0,255,209,0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .trading-window-info {
            background: rgba(255,215,0,0.1);
            border: 1px solid #ffd700;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .window-time {
            font-size: 20px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 5px;
        }

        .countdown {
            font-size: 32px;
            font-weight: 700;
            color: #00ffd9;
            margin: 10px 0;
        }

        .trade-input {
            margin: 20px 0;
        }

        .trade-input input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,209,0.2);
            border-radius: 16px;
            padding: 12px;
            color: #fff;
            font-size: 14px;
        }

        .trade-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .btn-buy {
            background: rgba(46,204,113,0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-buy:hover {
            background: #2ecc71;
            color: #030507;
        }

        .btn-sell {
            background: rgba(255,107,107,0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-sell:hover {
            background: #ff6b6b;
            color: #030507;
        }

        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .trade-history {
            margin-top: 30px;
        }

        .history-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(0,255,209,0.1);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .win { color: #2ecc71; }
        .loss { color: #ff6b6b; }

        #tradingview-widget {
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>

    <div class="dashboard">
        <div class="back-btn" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>

        <div class="trading-container">
            <div class="chart-container">
                <div id="tradingview-widget"></div>
            </div>

            <div class="trading-panel">
                <div class="trading-window-info" id="windowInfo">
                    <div class="window-time" id="windowStatus">Loading...</div>
                    <div class="countdown" id="countdown">00:00</div>
                    <div id="windowMessage"></div>
                </div>

                <div class="trade-input">
                    <input type="number" id="tradeAmount" placeholder="Amount ($)" min="10" value="100">
                </div>

                <div class="trade-buttons">
                    <button class="btn-buy" id="buyBtn" onclick="placeTrade('BUY')">BUY</button>
                    <button class="btn-sell" id="sellBtn" onclick="placeTrade('SELL')">SELL</button>
                </div>

                <div id="tradeMessage" style="text-align:center; margin:10px 0; color:#00ffd9;"></div>

                <div class="trade-history">
                    <h3 style="margin-bottom:10px;">Recent Trades</h3>
                    <div id="tradeHistory"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const API_BASE_URL = 'https://gainixai-backend.onrender.com/api';
        let tradingActive = false;
        let countdownInterval;
        let tradeTimeout;

        // Initialize TradingView widget
        function initTradingView() {
            new TradingView.widget({
                "container_id": "tradingview-widget",
                "symbol": "BINANCE:BTCUSDT",
                "interval": "1",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "studies": ["MACD@tv-basicstudies"],
                "show_popup_button": true,
                "popup_width": "1000",
                "popup_height": "650"
            });
        }

        // Check trading window
        async function checkTradingWindow() {
            try {
                const response = await fetch(`${API_BASE_URL}/bot/settings`);
                const data = await response.json();
                
                if (data.success) {
                    const settings = data.data;
                    const now = new Date();
                    const currentHour = now.getUTCHours();
                    
                    const startHour = settings.tradingStartHour || 9;
                    const endHour = settings.tradingEndHour || 10;
                    
                    const isOpen = currentHour >= startHour && currentHour < endHour;
                    
                    document.getElementById('windowStatus').innerHTML = isOpen 
                        ? '✅ TRADING WINDOW OPEN' 
                        : '⏳ TRADING WINDOW CLOSED';
                    
                    document.getElementById('buyBtn').disabled = !isOpen;
                    document.getElementById('sellBtn').disabled = !isOpen;
                    
                    if (isOpen) {
                        startCountdown(endHour * 60 * 60 * 1000);
                    }
                    
                    return isOpen;
                }
            } catch (error) {
                console.error('Failed to check trading window:', error);
            }
            return false;
        }

        // Start countdown to window close
        function startCountdown(endTimeMs) {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                const now = new Date();
                const end = new Date();
                end.setUTCHours(10, 0, 0, 0);
                
                const diff = end - now;
                
                if (diff <= 0) {
                    document.getElementById('countdown').innerHTML = '00:00';
                    checkTradingWindow();
                    clearInterval(countdownInterval);
                    return;
                }
                
                const minutes = Math.floor(diff / (60 * 1000));
                const seconds = Math.floor((diff % (60 * 1000)) / 1000);
                
                document.getElementById('countdown').innerHTML = 
                    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // Place trade
        async function placeTrade(direction) {
            const amount = document.getElementById('tradeAmount').value;
            
            if (!amount || amount < 10) {
                alert('Minimum trade amount is $10');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/trade/place`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ amount: parseFloat(amount), direction })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('tradeMessage').innerHTML = 
                        `✅ Trade placed! Closing in 60 seconds...`;
                    
                    // Disable buttons for 60 seconds
                    document.getElementById('buyBtn').disabled = true;
                    document.getElementById('sellBtn').disabled = true;
                    
                    // Re-enable after 60 seconds
                    setTimeout(async () => {
                        const isOpen = await checkTradingWindow();
                        document.getElementById('buyBtn').disabled = !isOpen;
                        document.getElementById('sellBtn').disabled = !isOpen;
                        document.getElementById('tradeMessage').innerHTML = '';
                        loadTradeHistory();
                    }, 60 * 1000);
                    
                    loadTradeHistory();
                } else {
                    alert('Trade failed: ' + data.message);
                }
            } catch (error) {
                console.error('Trade error:', error);
                alert('Failed to place trade');
            }
        }

        // Load trade history
        async function loadTradeHistory() {
            try {
                const response = await fetch(`${API_BASE_URL}/trade/history`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const container = document.getElementById('tradeHistory');
                    let html = '';
                    
                    data.data.slice(0, 5).forEach(trade => {
                        const resultClass = trade.result === 'win' ? 'win' : 'loss';
                        const resultText = trade.result === 'win' ? '+$' + trade.profit.toFixed(2) : '-$' + Math.abs(trade.profit).toFixed(2);
                        
                        html += `
                            <div class="history-item">
                                <div>${trade.direction} $${trade.amount}</div>
                                <div class="${resultClass}">${resultText}</div>
                            </div>
                        `;
                    });
                    
                    container.innerHTML = html || '<p>No trades yet</p>';
                }
            } catch (error) {
                console.error('Failed to load trade history:', error);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            initTradingView();
            await checkTradingWindow();
            loadTradeHistory();
            
            // Check every minute
            setInterval(checkTradingWindow, 60 * 1000);
        });
    </script>
</body>
</html>
