<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAINIX AI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #030507;
            color: #fff;
            min-height: 100vh;
        }

        /* Premium Background */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(139, 92, 246, 0.08), transparent 60%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 209, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 209, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #00ffd9;
            border-radius: clamp(24px, 5vw, 40px);
            padding: clamp(30px, 6vw, 50px) clamp(20px, 4vw, 40px);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,255,209,0.3);
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: clamp(25px, 5vw, 35px);
        }

        .logo-cube {
            width: clamp(60px, 12vw, 80px);
            height: clamp(60px, 12vw, 80px);
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border-radius: clamp(18px, 4vw, 24px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            transform: rotate(45deg);
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 15px 30px rgba(0,255,209,0.3);
        }

        @keyframes float {
            0%, 100% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(-8px); }
        }

        .logo-cube i {
            transform: rotate(-45deg);
            font-size: clamp(30px, 6vw, 40px);
            color: #030507;
        }

        .logo h1 {
            font-size: clamp(26px, 6vw, 32px);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-align: center;
        }

        .logo p {
            color: #8899aa;
            font-size: clamp(12px, 3vw, 14px);
            text-align: center;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8899aa;
            font-size: 18px;
            z-index: 1;
        }

        .login-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,209,0.2);
            border-radius: 40px;
            padding: 16px 16px 16px 50px;
            color: #fff;
            font-size: clamp(14px, 3vw, 15px);
            transition: all 0.3s;
        }

        .login-input:focus {
            outline: none;
            border-color: #00ffd9;
            box-shadow: 0 0 0 3px rgba(0,255,209,0.2);
        }

        .login-input::placeholder {
            color: #667788;
            font-size: clamp(13px, 2.5vw, 14px);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 5px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00ffd9;
        }

        .remember-me label {
            color: #8899aa;
            font-size: clamp(12px, 2.5vw, 13px);
            cursor: pointer;
        }

        .forgot-link {
            color: #8899aa;
            font-size: clamp(12px, 2.5vw, 13px);
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #00ffd9;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            border-radius: 40px;
            padding: 16px;
            color: #030507;
            font-weight: 700;
            font-size: clamp(15px, 3vw, 17px);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0,255,209,0.5);
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #8899aa;
            font-size: clamp(12px, 2.5vw, 13px);
        }

        .register-link a {
            color: #00ffd9;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .modal-card {
            background: rgba(12,18,28,0.98);
            border: 2px solid #00ffd9;
            border-radius: clamp(24px, 5vw, 40px);
            padding: clamp(30px, 6vw, 40px) clamp(20px, 4vw, 30px);
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            width: clamp(60px, 12vw, 70px);
            height: clamp(60px, 12vw, 70px);
            background: linear-gradient(145deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: clamp(30px, 6vw, 35px);
            color: white;
        }

        .modal-title {
            font-size: clamp(22px, 5vw, 26px);
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #8899aa;
            margin-bottom: 25px;
            line-height: 1.6;
            font-size: clamp(13px, 2.5vw, 14px);
        }

        .modal-btn {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            border-radius: 40px;
            padding: 14px 30px;
            color: #030507;
            font-weight: 600;
            font-size: clamp(14px, 3vw, 15px);
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0,255,209,0.4);
        }

        /* Responsive Breakpoints */
        @media (max-width: 480px) {
            .login-card {
                padding: 25px 20px;
            }
            
            .checkbox-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .forgot-link {
                align-self: flex-start;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 20px 15px;
            }
            
            .login-input {
                padding: 14px 14px 14px 45px;
            }
        }

        /* Touch-friendly adjustments */
        @media (hover: none) and (pointer: coarse) {
            .login-btn,
            .modal-btn {
                padding: 18px;
                min-height: 54px;
            }
            
            .login-input {
                padding: 18px 18px 18px 50px;
                min-height: 54px;
            }
            
            .remember-me input {
                width: 22px;
                height: 22px;
            }
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="premium-bg"></div>
    <div class="grid-overlay"></div>

    <!-- Login Page -->
    <div id="login-page" class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-cube">
                    <i class="fas fa-brain"></i>
                </div>
                <h1>GAINIX AI</h1>
                <p>Welcome back</p>
            </div>
            
            <div class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginId" class="login-input" placeholder="User ID or Email" autocomplete="username">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="login-input" placeholder="Password" autocomplete="current-password">
                </div>
                
                <div class="checkbox-group">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" checked>
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link" onclick="showForgotModal()">Forgot Password?</a>
                </div>
                
                <button class="login-btn" onclick="handleLogin()">LOGIN</button>
                
                <div class="register-link">
                    Don't have an account? <a href="register.html">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal">
        <div class="modal-card">
            <div class="modal-icon" style="background: linear-gradient(145deg, #f39c12, #e67e22);">
                <i class="fas fa-key"></i>
            </div>
            
            <div class="modal-title">Reset Password</div>
            
            <div class="modal-text">
                Enter your email address and we'll send you a link to reset your password.
            </div>
            
            <input type="email" id="resetEmail" class="login-input" placeholder="Email Address" style="margin-bottom: 20px;">
            
            <button class="modal-btn" onclick="sendResetLink()">SEND RESET LINK</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-card">
            <div class="modal-icon">
                <i class="fas fa-check"></i>
            </div>
            
            <div class="modal-title">Check Your Email</div>
            
            <div class="modal-text">
                Password reset link has been sent to your email address.
            </div>
            
            <button class="modal-btn" onclick="closeSuccessModal()">OK</button>
        </div>
    </div>

    <script>
        // On page load - check for saved credentials
        window.addEventListener('load', function() {
            const savedId = localStorage.getItem('rememberedId');
            if (savedId) {
                document.getElementById('loginId').value = savedId;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // Login function - FIXED: userId ki jagah loginId use kiya
        function handleLogin() {
            const loginId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            
            // Validation
            if (!loginId || !password) {
                showAlert('Please enter both User ID and Password');
                return;
            }
            
            // Save to localStorage if remember me is checked
            if (remember) {
                localStorage.setItem('rememberedId', loginId);
            } else {
                localStorage.removeItem('rememberedId');
            }
            
            // Call backend API from auth.js
            if (typeof loginUser === 'function') {
                loginUser(loginId, password, remember);
            } else {
                // Fallback demo mode
                showAlert('Logging in... (Demo Mode)');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        }

        // Show forgot password modal
        function showForgotModal() {
            document.getElementById('forgotModal').style.display = 'flex';
        }

        // Send reset link
        function sendResetLink() {
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!email) {
                alert('Please enter your email address');
                return;
            }
            
            // Close forgot modal
            document.getElementById('forgotModal').style.display = 'none';
            
            // Show success modal
            document.getElementById('successModal').style.display = 'flex';
        }

        // Close success modal
        function closeSuccessModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        // Custom alert function
        function showAlert(message) {
            alert(message);
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            const forgotModal = document.getElementById('forgotModal');
            const successModal = document.getElementById('successModal');
            
            if (event.target === forgotModal) {
                forgotModal.style.display = 'none';
            }
            if (event.target === successModal) {
                successModal.style.display = 'none';
            }
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
