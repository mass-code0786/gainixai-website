<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAINIX AI - Team Structure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #03050a;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(139, 92, 246, 0.08), transparent 60%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 209, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 209, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 8px 18px;
            color: #00ffd9;
            cursor: pointer;
            margin-bottom: 18px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 255, 209, 0.2);
            transform: translateX(-4px);
        }

        .page-title {
            font-size: 22px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-section {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .search-title {
            font-size: 15px;
            color: #8899aa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-title i {
            color: #00ffd9;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 24px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #00ffd9;
            box-shadow: 0 0 0 2px rgba(0, 255, 209, 0.1);
        }

        .search-input::placeholder {
            color: #667788;
        }

        .search-btn {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            border-radius: 24px;
            padding: 0 22px;
            color: #030507;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 16px rgba(0, 255, 209, 0.3);
        }

        .search-info {
            font-size: 11px;
            color: #8899aa;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .search-info i {
            color: #00ffd9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 20px;
            padding: 14px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #8899aa;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #00ffd9;
        }

        .level-tabs {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            padding: 4px;
            background: rgba(8, 12, 20, 0.6);
            border-radius: 40px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .level-tab {
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            color: #8899aa;
        }

        .level-tab:hover {
            color: #00ffd9;
        }

        .level-tab.active {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            color: #030507;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 209, 0.1);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .member-card:hover {
            border-color: #00ffd9;
            background: rgba(0, 255, 209, 0.05);
            transform: translateY(-2px);
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #030507;
            flex-shrink: 0;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .member-id {
            font-size: 10px;
            color: #8899aa;
            margin-bottom: 3px;
        }

        .member-contribution {
            color: #00ffd9;
            font-weight: 600;
            font-size: 12px;
        }

        .no-data {
            text-align: center;
            padding: 40px 16px;
            color: #8899aa;
            grid-column: 1 / -1;
        }

        .no-data i {
            font-size: 40px;
            color: #00ffd9;
            opacity: 0.3;
            margin-bottom: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8899aa;
            grid-column: 1 / -1;
        }

        .loading i {
            margin-right: 8px;
            color: #00ffd9;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 209, 0.2);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 8px 0 14px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: #8899aa;
            font-size: 9px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 16px;
        }

        .nav-item.active {
            color: #00ffd9;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="grid-overlay"></div>

    <div class="dashboard">
        <!-- Back Button -->
        <div class="back-btn" onclick="goToDashboard()">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>

        <!-- Page Title -->
        <div class="page-title">
            <i class="fas fa-sitemap"></i> Team Structure
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-title">
                <i class="fas fa-search"></i> SEARCH ANY LEVEL (1 to 1,000,000)
            </div>
            
            <div class="search-box">
                <input type="number" id="levelSearchInput" class="search-input" 
                       placeholder="Enter level number" 
                       min="1" max="1000000" step="1" value="1">
                <button class="search-btn" onclick="searchLevel()">
                    <i class="fas fa-arrow-right"></i> GO
                </button>
            </div>
            
            <div class="search-info">
                <i class="fas fa-info-circle"></i>
                Search any level from 1 to 1,000,000
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Members</div>
                <div class="stat-value" id="totalMembers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Volume</div>
                <div class="stat-value" id="totalVolume">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Stakers</div>
                <div class="stat-value" id="activeStakers">0</div>
            </div>
        </div>

        <!-- Level Tabs -->
        <div class="level-tabs">
            <div class="level-tab active" onclick="loadTeamLevel(1)">Level 1</div>
            <div class="level-tab" onclick="loadTeamLevel(2)">Level 2</div>
            <div class="level-tab" onclick="loadTeamLevel(3)">Level 3</div>
            <div class="level-tab" onclick="loadTeamLevel(4)">Level 4</div>
            <div class="level-tab" onclick="loadTeamLevel(5)">Level 5</div>
        </div>

        <!-- Members Grid -->
        <div id="membersList" class="members-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading team members...
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='salary.html'"><i class="fas fa-star"></i><span>Salary</span></div>
        <div class="nav-item active" onclick="window.location.href='team.html'"><i class="fas fa-users"></i><span>Team</span></div>
        <div class="nav-item" onclick="window.location.href='p2p.html'"><i class="fas fa-handshake"></i><span>P2P</span></div>
        <div class="nav-item" onclick="window.location.href='history.html'"><i class="fas fa-history"></i><span>History</span></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // ============================================
        // TEAM PAGE - 100% BACKEND CONNECTED
        // ============================================

        const API_URL = API_BASE_URL || 'https://gainixai-backend.onrender.com/api';

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            await loadTeamLevel(1);
        });

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ============================================
        // LOAD TEAM MEMBERS FROM BACKEND
        // ============================================
        async function loadTeamLevel(level) {
            // Update active tab
            document.querySelectorAll('.level-tab').forEach(tab => tab.classList.remove('active'));
            const tabs = document.querySelectorAll('.level-tab');
            if (tabs[level - 1]) tabs[level - 1].classList.add('active');

            // Show loading
            const membersContainer = document.getElementById('membersList');
            membersContainer.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading level ${level}...
                </div>
            `;

            try {
                // Call API
                const response = await fetch(`${API_URL}/team/level/${level}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    // Update stats
                    const totalMembers = data.data.length;
                    const totalVolume = data.data.reduce((sum, m) => sum + (m.contribution || m.staked || 0), 0);
                    const activeStakers = data.data.filter(m => m.active || (m.contribution > 0) || (m.staked > 0)).length;
                    
                    document.getElementById('totalMembers').innerText = totalMembers;
                    document.getElementById('totalVolume').innerText = '$' + totalVolume.toFixed(2);
                    document.getElementById('activeStakers').innerText = activeStakers;
                    
                    // Render members
                    let html = '';
                    data.data.forEach(member => {
                        const contribution = member.contribution || member.staked || 0;
                        const name = member.name || member.fullName || `Team Member`;
                        const userId = member.userId || member.id || `Gainix${100000 + Math.floor(Math.random()*9000)}`;
                        const avatarLetter = name ? name[0].toUpperCase() : 'U';
                        
                        html += `
                            <div class="member-card">
                                <div class="member-avatar">${avatarLetter}</div>
                                <div class="member-info">
                                    <div class="member-name">${name}</div>
                                    <div class="member-id">${userId}</div>
                                    <div class="member-contribution">$${contribution}</div>
                                </div>
                            </div>
                        `;
                    });
                    membersContainer.innerHTML = html;
                } else {
                    // No members found
                    document.getElementById('totalMembers').innerText = '0';
                    document.getElementById('totalVolume').innerText = '$0';
                    document.getElementById('activeStakers').innerText = '0';
                    
                    membersContainer.innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-users-slash"></i>
                            <p>No members found at level ${level}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load team:', error);
                membersContainer.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Failed to load team data</p>
                    </div>
                `;
            }
        }

        // ============================================
        // SEARCH LEVEL FUNCTION
        // ============================================
        async function searchLevel() {
            const input = document.getElementById('levelSearchInput');
            const level = parseInt(input?.value);
            
            if (!level || level < 1 || level > 1000000) {
                alert('Please enter a valid level between 1 and 1,000,000');
                return;
            }
            await loadTeamLevel(level);
        }

        // Export functions
        window.loadTeamLevel = loadTeamLevel;
        window.searchLevel = searchLevel;
        window.goToDashboard = goToDashboard;
    </script>
</body>
</html>
