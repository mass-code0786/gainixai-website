<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAINIX AI - Team Structure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #03050a;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(139, 92, 246, 0.08), transparent 60%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 209, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 209, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 40px;
            padding: 12px 24px;
            color: #00ffd9;
            cursor: pointer;
            margin-bottom: 25px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 255, 209, 0.2);
            transform: translateX(-5px);
        }

        /* Page Title */
        .page-title {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Search Section */
        .search-section {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .search-title {
            font-size: 18px;
            color: #8899aa;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-title i {
            color: #00ffd9;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 16px 20px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: #00ffd9;
            box-shadow: 0 0 0 3px rgba(0, 255, 209, 0.1);
        }

        .search-input::placeholder {
            color: #667788;
        }

        .search-btn {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            border-radius: 30px;
            padding: 0 30px;
            color: #030507;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 209, 0.3);
        }

        .search-info {
            font-size: 13px;
            color: #8899aa;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .search-info i {
            color: #00ffd9;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            color: #8899aa;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #00ffd9;
        }

        /* Level Tabs */
        .level-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            padding: 5px;
            background: rgba(8, 12, 20, 0.6);
            border-radius: 50px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .level-tab {
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            color: #8899aa;
        }

        .level-tab:hover {
            color: #00ffd9;
        }

        .level-tab.active {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            color: #030507;
        }

        /* Members Grid */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .member-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 209, 0.1);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .member-card:hover {
            border-color: #00ffd9;
            background: rgba(0, 255, 209, 0.05);
            transform: translateY(-2px);
        }

        .member-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #030507;
        }

        .member-info {
            flex: 1;
        }

        .member-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .member-id {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .member-contribution {
            color: #00ffd9;
            font-weight: 600;
            font-size: 14px;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #8899aa;
            grid-column: 1 / -1;
        }

        .no-data i {
            font-size: 50px;
            color: #00ffd9;
            opacity: 0.3;
            margin-bottom: 15px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 209, 0.2);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 0 18px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8899aa;
            font-size: 10px;
            cursor: pointer;
            padding: 6px;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active {
            color: #00ffd9;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-btn {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="grid-overlay"></div>

    <div class="dashboard">
        <!-- Back Button -->
        <div class="back-btn" onclick="goToDashboard()">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>

        <!-- Page Title -->
        <div class="page-title">
            <i class="fas fa-sitemap"></i> Team Structure
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-title">
                <i class="fas fa-search"></i> SEARCH ANY LEVEL (1 to 1,000,000)
            </div>
            
            <div class="search-box">
                <input type="number" id="levelSearchInput" class="search-input" 
                       placeholder="Enter level number (e.g., 1, 10, 100, 1000...)" 
                       min="1" max="1000000" step="1" value="1">
                <button class="search-btn" onclick="searchLevel()">
                    <i class="fas fa-arrow-right"></i> GO
                </button>
            </div>
            
            <div class="search-info">
                <i class="fas fa-info-circle"></i>
                Search any level from 1 to 1,000,000 to see team members at that depth
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Members</div>
                <div class="stat-value" id="totalMembers">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Volume</div>
                <div class="stat-value" id="totalVolume">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Stakers</div>
                <div class="stat-value" id="activeStakers">0</div>
            </div>
        </div>

        <!-- Level Tabs -->
        <div class="level-tabs">
            <div class="level-tab active" onclick="loadTeamLevel(1)">Level 1</div>
            <div class="level-tab" onclick="loadTeamLevel(2)">Level 2</div>
            <div class="level-tab" onclick="loadTeamLevel(3)">Level 3</div>
            <div class="level-tab" onclick="loadTeamLevel(4)">Level 4</div>
            <div class="level-tab" onclick="loadTeamLevel(5)">Level 5</div>
        </div>

        <!-- Members Grid -->
        <div id="membersList" class="members-grid">
            <div class="no-data">
                <i class="fas fa-users"></i>
                <p>No members found</p>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-home"></i><span>Home</span>
        </div>
        <div class="nav-item" onclick="window.location.href='salary.html'">
            <i class="fas fa-star"></i><span>Salary</span>
        </div>
        <div class="nav-item active" onclick="window.location.href='team.html'">
            <i class="fas fa-users"></i><span>Team</span>
        </div>
        <div class="nav-item" onclick="window.location.href='p2p.html'">
            <i class="fas fa-handshake"></i><span>P2P</span>
        </div>
        <div class="nav-item" onclick="window.location.href='history.html'">
            <i class="fas fa-history"></i><span>History</span>
        </div>
    </div>

    <!-- Scripts - ONLY team page specific scripts -->
    <script src="js/api.js"></script>
    <script>
        // ============================================
        // TEAM PAGE SPECIFIC JAVASCRIPT
        // ============================================

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Team page initializing...');
            
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // Load Level 1 by default
            await loadTeamLevel(1);
        });

        // Go back to dashboard
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // Load team members by level
        async function loadTeamLevel(level) {
            console.log(`📊 Loading level ${level}...`);
            
            // Update active tab
            document.querySelectorAll('.level-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            // Find and activate the clicked tab
            const tabs = document.querySelectorAll('.level-tab');
            if (tabs[level - 1]) {
                tabs[level - 1].classList.add('active');
            }

            // Show loading
            const membersContainer = document.getElementById('membersList');
            membersContainer.innerHTML = `
                <div class="no-data">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading level ${level}...</p>
                </div>
            `;

            try {
                // Call API to get team members
                const result = await getTeamByLevel(level);
                
                if (result?.success && result.data && result.data.length > 0) {
                    // Update stats
                    const totalMembers = result.data.length;
                    const totalVolume = result.data.reduce((sum, m) => sum + (m.contribution || 0), 0);
                    const activeStakers = result.data.filter(m => m.active || m.contribution > 0).length;
                    
                    document.getElementById('totalMembers').innerText = totalMembers;
                    document.getElementById('totalVolume').innerText = '$' + totalVolume.toFixed(2);
                    document.getElementById('activeStakers').innerText = activeStakers;
                    
                    // Render members
                    let html = '';
                    result.data.forEach(member => {
                        html += `
                            <div class="member-card">
                                <div class="member-avatar">${member.name ? member.name[0].toUpperCase() : 'U'}</div>
                                <div class="member-info">
                                    <div class="member-name">${member.name || 'Unknown'}</div>
                                    <div class="member-id">${member.userId || 'Gainix10000'}</div>
                                    <div class="member-contribution">$${member.contribution || 0}</div>
                                </div>
                            </div>
                        `;
                    });
                    membersContainer.innerHTML = html;
                } else {
                    // No members found
                    document.getElementById('totalMembers').innerText = '0';
                    document.getElementById('totalVolume').innerText = '$0';
                    document.getElementById('activeStakers').innerText = '0';
                    
                    membersContainer.innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-users-slash"></i>
                            <p>No members found at level ${level}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load team:', error);
                membersContainer.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Failed to load team data</p>
                    </div>
                `;
            }
        }

        // Search level function
        async function searchLevel() {
            const input = document.getElementById('levelSearchInput');
            const level = parseInt(input?.value);
            
            if (!level || level < 1 || level > 1000000) {
                alert('Please enter a valid level between 1 and 1,000,000');
                return;
            }

            await loadTeamLevel(level);
        }

        // Toast notification function (optional)
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#2ecc71' : type === 'error' ? '#ff6b6b' : '#00ffd9'};
                color: ${type === 'success' || type === 'error' ? '#fff' : '#030507'};
                padding: 12px 24px;
                border-radius: 40px;
                font-weight: 600;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            `;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
