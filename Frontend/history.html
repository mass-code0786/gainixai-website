<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAINIX AI - Transaction History</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #03050a;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(139, 92, 246, 0.08), transparent 60%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 209, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 209, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 40px;
            padding: 12px 24px;
            color: #00ffd9;
            cursor: pointer;
            margin-bottom: 25px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 255, 209, 0.2);
            transform: translateX(-5px);
        }

        .page-title {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .summary-card {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .summary-label {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 20px;
            font-weight: 700;
            color: #00ffd9;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 5px;
            background: rgba(8, 12, 20, 0.6);
            border-radius: 50px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-tab {
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            color: #8899aa;
        }

        .filter-tab:hover {
            color: #00ffd9;
        }

        .filter-tab.active {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            color: #030507;
        }

        /* Date Filter */
        .date-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 20px;
            padding: 10px 15px;
            color: #fff;
            font-size: 14px;
        }

        .date-input:focus {
            outline: none;
            border-color: #00ffd9;
        }

        .apply-btn {
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 20px;
            padding: 10px 25px;
            color: #00ffd9;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .apply-btn:hover {
            background: rgba(0, 255, 209, 0.2);
        }

        /* Transaction List */
        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .transaction-item {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.1);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            cursor: pointer;
        }

        .transaction-item:hover {
            border-color: #00ffd9;
            transform: translateX(5px);
        }

        .transaction-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .transaction-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, rgba(0, 255, 209, 0.2), rgba(0, 153, 255, 0.2));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .staking-icon { color: #00ffd9; }
        .referral-icon { color: #ffd700; }
        .salary-icon { color: #ffd700; }
        .level-icon { color: #00ffd9; }
        .p2p-icon { color: #ff6b6b; }
        .withdraw-icon { color: #ff6b6b; }

        .transaction-details {
            flex: 1;
        }

        .transaction-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .transaction-subtitle {
            font-size: 13px;
            color: #8899aa;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .transaction-subtitle i {
            font-size: 12px;
            margin-right: 3px;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 18px;
            min-width: 100px;
            text-align: right;
        }

        .amount-positive {
            color: #2ecc71;
        }

        .amount-negative {
            color: #ff6b6b;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8899aa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover {
            border-color: #00ffd9;
            color: #00ffd9;
        }

        .page-btn.active {
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            color: #030507;
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #8899aa;
        }

        .no-data i {
            font-size: 60px;
            color: #00ffd9;
            opacity: 0.3;
            margin-bottom: 15px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 209, 0.2);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 0 18px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8899aa;
            font-size: 10px;
            cursor: pointer;
            padding: 6px;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active {
            color: #00ffd9;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .transaction-subtitle {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            
            .transaction-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .transaction-amount {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="grid-overlay"></div>

    <div class="dashboard">
        <!-- Back Button -->
        <div class="back-btn" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>

        <!-- Page Title -->
        <div class="page-title">
            <i class="fas fa-history"></i> Transaction History
        </div>

        <!-- Summary Cards -->
        <div class="summary-grid">
            <div class="summary-card">
                <div class="summary-label">Total Income</div>
                <div class="summary-value" id="totalIncome">$12,450</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">Total Withdrawn</div>
                <div class="summary-value" id="totalWithdrawn">$3,200</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">P2P Sent</div>
                <div class="summary-value" id="p2pSent">$1,500</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">P2P Received</div>
                <div class="summary-value" id="p2pReceived">$850</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <div class="filter-tab active" onclick="filterTransactions('all')">All</div>
            <div class="filter-tab" onclick="filterTransactions('staking')">Staking</div>
            <div class="filter-tab" onclick="filterTransactions('referral')">Referral</div>
            <div class="filter-tab" onclick="filterTransactions('salary')">Salary</div>
            <div class="filter-tab" onclick="filterTransactions('level')">Level</div>
            <div class="filter-tab" onclick="filterTransactions('p2p')">P2P</div>
            <div class="filter-tab" onclick="filterTransactions('withdraw')">Withdraw</div>
        </div>

        <!-- Date Filter -->
        <div class="date-filter">
            <input type="date" class="date-input" id="startDate" value="2026-03-01">
            <span style="color: #8899aa;">to</span>
            <input type="date" class="date-input" id="endDate" value="2026-03-03">
            <button class="apply-btn" onclick="applyDateFilter()">Apply</button>
        </div>

        <!-- Transaction List -->
        <div class="transaction-list" id="transactionList">
            <!-- Transactions will be loaded here -->
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <div class="page-btn active">1</div>
            <div class="page-btn">2</div>
            <div class="page-btn">3</div>
            <div class="page-btn">4</div>
            <div class="page-btn">5</div>
            <div class="page-btn">→</div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='salary.html'"><i class="fas fa-star"></i><span>Salary</span></div>
        <div class="nav-item" onclick="window.location.href='team.html'"><i class="fas fa-users"></i><span>Team</span></div>
        <div class="nav-item" onclick="window.location.href='p2p.html'"><i class="fas fa-handshake"></i><span>P2P</span></div>
        <div class="nav-item active" onclick="window.location.href='history.html'"><i class="fas fa-history"></i><span>History</span></div>
    </div>

    <script>
        // Sample transaction data
        const transactions = [
            {
                id: 1,
                type: 'staking',
                title: 'BASIC Staking ROI',
                subtitle: 'Daily ROI - BASIC Package',
                amount: 4.50,
                date: '2026-03-03',
                time: '10:30 AM',
                status: 'completed',
                from: 'System',
                package: 'BASIC'
            },
            {
                id: 2,
                type: 'staking',
                title: 'PRO Staking ROI',
                subtitle: 'Daily ROI - PRO Package',
                amount: 11.50,
                date: '2026-03-03',
                time: '10:30 AM',
                status: 'completed',
                from: 'System',
                package: 'PRO'
            },
            {
                id: 3,
                type: 'referral',
                title: 'Direct Referral Bonus',
                subtitle: 'From Gainix100002',
                amount: 25.00,
                date: '2026-03-03',
                time: '09:15 AM',
                status: 'completed',
                from: 'Alice Johnson',
                package: 'ELITE'
            },
            {
                id: 4,
                type: 'salary',
                title: 'Weekly Salary',
                subtitle: 'Rank 2 ⭐⭐',
                amount: 60.00,
                date: '2026-03-02',
                time: '12:00 AM',
                status: 'completed'
            },
            {
                id: 5,
                type: 'level',
                title: 'Level 1 Commission',
                subtitle: 'From Team ROI',
                amount: 32.40,
                date: '2026-03-02',
                time: '10:10 AM',
                status: 'completed',
                level: 1
            },
            {
                id: 6,
                type: 'level',
                title: 'Level 2 Commission',
                subtitle: 'From Team ROI',
                amount: 22.68,
                date: '2026-03-02',
                time: '10:10 AM',
                status: 'completed',
                level: 2
            },
            {
                id: 7,
                type: 'p2p',
                title: 'P2P Transfer Sent',
                subtitle: 'To Gainix100003',
                amount: -100.00,
                date: '2026-03-02',
                time: '02:30 PM',
                status: 'completed',
                to: 'Gainix100003'
            },
            {
                id: 8,
                type: 'p2p',
                title: 'P2P Transfer Received',
                subtitle: 'From Gainix100002',
                amount: 250.00,
                date: '2026-03-01',
                time: '11:20 AM',
                status: 'completed',
                from: 'Gainix100002'
            },
            {
                id: 9,
                type: 'withdraw',
                title: 'Withdrawal',
                subtitle: 'To BEP20 Wallet',
                amount: -50.00,
                date: '2026-03-01',
                time: '09:45 AM',
                status: 'completed'
            },
            {
                id: 10,
                type: 'referral',
                title: 'Direct Referral Bonus',
                subtitle: 'From Gainix100004',
                amount: 35.00,
                date: '2026-02-28',
                time: '03:45 PM',
                status: 'completed',
                from: 'Bob Smith',
                package: 'ELITE'
            },
            {
                id: 11,
                type: 'staking',
                title: 'ELITE Staking ROI',
                subtitle: 'Daily ROI - ELITE Package',
                amount: 29.00,
                date: '2026-02-28',
                time: '10:30 AM',
                status: 'completed',
                from: 'System',
                package: 'ELITE'
            },
            {
                id: 12,
                type: 'salary',
                title: 'Weekly Salary',
                subtitle: 'Rank 2 ⭐⭐',
                amount: 60.00,
                date: '2026-02-22',
                time: '12:00 AM',
                status: 'completed'
            }
        ];

        let currentFilter = 'all';
        let filteredTransactions = [...transactions];

        // Load transactions on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadTransactions();
            updateSummary();
        });

        // Load transactions into DOM
        function loadTransactions() {
            const container = document.getElementById('transactionList');
            
            if (filteredTransactions.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-history"></i>
                        <p>No transactions found</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredTransactions.forEach(t => {
                const isPositive = t.amount > 0;
                const iconClass = getIconClass(t.type);
                
                html += `
                    <div class="transaction-item" onclick="showTransactionDetails(${t.id})">
                        <div class="transaction-left">
                            <div class="transaction-icon ${iconClass}">
                                <i class="fas ${getIcon(t.type)}"></i>
                            </div>
                            <div class="transaction-details">
                                <div class="transaction-title">${t.title}</div>
                                <div class="transaction-subtitle">
                                    <span><i class="far fa-calendar"></i> ${t.date}</span>
                                    <span><i class="far fa-clock"></i> ${t.time}</span>
                                    ${t.from ? `<span><i class="fas fa-user"></i> ${t.from}</span>` : ''}
                                    ${t.to ? `<span><i class="fas fa-user"></i> ${t.to}</span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="transaction-amount ${isPositive ? 'amount-positive' : 'amount-negative'}">
                            ${isPositive ? '+' : ''}$${Math.abs(t.amount).toFixed(2)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Get icon for transaction type
        function getIcon(type) {
            switch(type) {
                case 'staking': return 'fa-coins';
                case 'referral': return 'fa-hand-holding-usd';
                case 'salary': return 'fa-star';
                case 'level': return 'fa-sitemap';
                case 'p2p': return 'fa-handshake';
                case 'withdraw': return 'fa-arrow-up';
                default: return 'fa-history';
            }
        }

        // Get icon class for transaction type
        function getIconClass(type) {
            switch(type) {
                case 'staking': return 'staking-icon';
                case 'referral': return 'referral-icon';
                case 'salary': return 'salary-icon';
                case 'level': return 'level-icon';
                case 'p2p': return 'p2p-icon';
                case 'withdraw': return 'withdraw-icon';
                default: return '';
            }
        }

        // Filter transactions by type
        function filterTransactions(type) {
            currentFilter = type;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter transactions
            if (type === 'all') {
                filteredTransactions = [...transactions];
            } else {
                filteredTransactions = transactions.filter(t => t.type === type);
            }
            
            loadTransactions();
        }

        // Apply date filter
        function applyDateFilter() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!startDate || !endDate) {
                alert('Please select both dates');
                return;
            }

            const start = new Date(startDate);
            const end = new Date(endDate);
            end.setHours(23, 59, 59); // Include entire end day
            
            filteredTransactions = transactions.filter(t => {
                const tDate = new Date(t.date);
                return tDate >= start && tDate <= end;
            });
            
            if (currentFilter !== 'all') {
                filteredTransactions = filteredTransactions.filter(t => t.type === currentFilter);
            }
            
            loadTransactions();
            
            if (filteredTransactions.length === 0) {
                alert('No transactions found for selected date range');
            }
        }

        // Update summary cards
        function updateSummary() {
            const totalIncome = transactions
                .filter(t => t.amount > 0)
                .reduce((sum, t) => sum + t.amount, 0);
            
            const totalWithdrawn = transactions
                .filter(t => t.type === 'withdraw')
                .reduce((sum, t) => sum + Math.abs(t.amount), 0);
            
            const p2pSent = transactions
                .filter(t => t.type === 'p2p' && t.amount < 0)
                .reduce((sum, t) => sum + Math.abs(t.amount), 0);
            
            const p2pReceived = transactions
                .filter(t => t.type === 'p2p' && t.amount > 0)
                .reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('totalIncome').innerText = '$' + totalIncome.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('totalWithdrawn').innerText = '$' + totalWithdrawn.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('p2pSent').innerText = '$' + p2pSent.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('p2pReceived').innerText = '$' + p2pReceived.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        // Show transaction details (can be expanded)
        function showTransactionDetails(id) {
            const transaction = transactions.find(t => t.id === id);
            if (transaction) {
                alert(`
                    ${transaction.title}
                    Amount: $${Math.abs(transaction.amount).toFixed(2)}
                    Date: ${transaction.date} ${transaction.time}
                    Status: ${transaction.status}
                `);
            }
        }

        // Pagination (simplified)
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                // In a real app, you would load the next page of transactions here
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
