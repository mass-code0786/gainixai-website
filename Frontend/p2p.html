<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAINIX AI - P2P Transfer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #03050a;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(139, 92, 246, 0.08), transparent 60%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 209, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 209, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 8px 18px;
            color: #00ffd9;
            cursor: pointer;
            margin-bottom: 18px;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 255, 209, 0.2);
            transform: translateX(-4px);
        }

        .page-title {
            font-size: 22px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Wallet Cards */
        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .wallet-card {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 20px;
            padding: 16px;
        }

        .wallet-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .wallet-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #030507;
        }

        .wallet-title {
            font-size: 13px;
            color: #8899aa;
        }

        .wallet-balance {
            font-size: 24px;
            font-weight: 700;
            color: #00ffd9;
        }

        /* Transfer Form */
        .transfer-form {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-title {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ffd9;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            margin-bottom: 6px;
            color: #8899aa;
            font-size: 12px;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 18px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #00ffd9;
            box-shadow: 0 0 0 2px rgba(0, 255, 209, 0.1);
        }

        .input-field::placeholder {
            color: #667788;
        }

        /* PIN Input */
        .pin-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 16px 0;
        }

        .pin-field {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            text-align: center;
        }

        .pin-field:focus {
            outline: none;
            border-color: #00ffd9;
        }

        .transfer-btn {
            width: 100%;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: #030507;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .transfer-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 0 20px rgba(0, 255, 209, 0.4);
        }

        /* History Section */
        .history-section {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 24px;
            padding: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-title {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #00ffd9;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 209, 0.1);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(145deg, rgba(0, 255, 209, 0.2), rgba(0, 153, 255, 0.2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #00ffd9;
        }

        .history-details {
            font-size: 12px;
        }

        .history-user {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .history-date {
            font-size: 10px;
            color: #8899aa;
        }

        .history-amount {
            font-weight: 700;
            font-size: 14px;
        }

        .amount-sent {
            color: #ff6b6b;
        }

        .amount-received {
            color: #2ecc71;
        }

        .no-data {
            text-align: center;
            padding: 30px 16px;
            color: #8899aa;
        }

        .no-data i {
            font-size: 40px;
            color: #00ffd9;
            opacity: 0.3;
            margin-bottom: 12px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8899aa;
        }

        .loading i {
            margin-right: 8px;
            color: #00ffd9;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 209, 0.2);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 8px 0 14px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: #8899aa;
            font-size: 9px;
            cursor: pointer;
            padding: 4px;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 16px;
        }

        .nav-item.active {
            color: #00ffd9;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .wallet-grid {
                grid-template-columns: 1fr;
            }
            
            .pin-field {
                width: 40px;
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .pin-field {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="grid-overlay"></div>

    <div class="dashboard">
        <!-- Back Button -->
        <div class="back-btn" onclick="goToDashboard()">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>

        <!-- Page Title -->
        <div class="page-title">
            <i class="fas fa-handshake"></i> P2P Transfer
        </div>

        <!-- Wallet Cards -->
        <div class="wallet-grid">
            <div class="wallet-card">
                <div class="wallet-header">
                    <div class="wallet-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <span class="wallet-title">Fund Wallet</span>
                </div>
                <div class="wallet-balance" id="fundWallet">$0</div>
            </div>
            <div class="wallet-card">
                <div class="wallet-header">
                    <div class="wallet-icon">
                        <i class="fas fa-arrow-up"></i>
                    </div>
                    <span class="wallet-title">Withdraw Wallet</span>
                </div>
                <div class="wallet-balance" id="withdrawWallet">$0</div>
            </div>
        </div>

        <!-- Transfer Form -->
        <div class="transfer-form">
            <div class="form-title">
                <i class="fas fa-paper-plane"></i> Send P2P Transfer
            </div>

            <div class="input-group">
                <label class="input-label">Recipient User ID</label>
                <input type="text" id="recipientId" class="input-field" placeholder="Enter GAINIX AI ID (e.g., Gainix100002)">
            </div>

            <div class="input-group">
                <label class="input-label">Amount ($)</label>
                <input type="number" id="amount" class="input-field" placeholder="Enter amount" min="1">
            </div>

            <div class="input-group">
                <label class="input-label">Enter 4-digit PIN</label>
                <div class="pin-container">
                    <input type="password" class="pin-field" maxlength="1" onkeyup="moveToNext(this, 0)">
                    <input type="password" class="pin-field" maxlength="1" onkeyup="moveToNext(this, 1)">
                    <input type="password" class="pin-field" maxlength="1" onkeyup="moveToNext(this, 2)">
                    <input type="password" class="pin-field" maxlength="1" onkeyup="moveToNext(this, 3)">
                </div>
            </div>

            <button class="transfer-btn" onclick="sendP2P()" id="sendBtn">
                <i class="fas fa-paper-plane"></i> SEND TRANSFER
            </button>
        </div>

        <!-- Transaction History -->
        <div class="history-section">
            <div class="history-header">
                <div class="history-title">
                    <i class="fas fa-history"></i> P2P Transaction History
                </div>
            </div>

            <div class="history-list" id="p2pHistory">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading transactions...
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='salary.html'"><i class="fas fa-star"></i><span>Salary</span></div>
        <div class="nav-item" onclick="window.location.href='team.html'"><i class="fas fa-users"></i><span>Team</span></div>
        <div class="nav-item active" onclick="window.location.href='p2p.html'"><i class="fas fa-handshake"></i><span>P2P</span></div>
        <div class="nav-item" onclick="window.location.href='history.html'"><i class="fas fa-history"></i><span>History</span></div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // ============================================
        // P2P PAGE - 100% BACKEND CONNECTED
        // ============================================

        const API_URL = API_BASE_URL || 'https://gainixai-backend.onrender.com/api';

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            await loadWalletBalances();
            await loadP2PHistory();
        });

        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ============================================
        // LOAD WALLET BALANCES FROM BACKEND
        // ============================================
        async function loadWalletBalances() {
            try {
                const response = await fetch(`${API_URL}/wallet/balances`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('fundWallet').innerText = '$' + data.data.fundWallet;
                    document.getElementById('withdrawWallet').innerText = '$' + data.data.withdrawWallet;
                    
                    // Update localStorage
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    user.fundWallet = data.data.fundWallet;
                    user.withdrawWallet = data.data.withdrawWallet;
                    localStorage.setItem('user', JSON.stringify(user));
                } else {
                    throw new Error('Failed to load balances');
                }
            } catch (error) {
                console.error('Error loading wallet balances:', error);
                
                // Try staking stats API as fallback
                try {
                    const result = await getStakingStats();
                    if (result?.success) {
                        const stats = result.data.summary;
                        document.getElementById('fundWallet').innerText = '$' + (stats.fundWallet || 0);
                        document.getElementById('withdrawWallet').innerText = '$' + (stats.withdrawWallet || 0);
                    } else {
                        showError('Could not load wallet balances');
                    }
                } catch (e) {
                    showError('Backend connection failed');
                }
            }
        }

        // ============================================
        // LOAD P2P HISTORY FROM BACKEND
        // ============================================
        async function loadP2PHistory() {
            const historyDiv = document.getElementById('p2pHistory');
            
            try {
                const response = await fetch(`${API_URL}/p2p/history`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success && data.data.length > 0) {
                    renderHistory(data.data);
                } else {
                    // No transactions - show empty state
                    historyDiv.innerHTML = `
                        <div class="no-data">
                            <i class="fas fa-history"></i>
                            <p>No P2P transactions yet</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading P2P history:', error);
                historyDiv.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Could not load transaction history</p>
                    </div>
                `;
            }
        }

        // ============================================
        // RENDER HISTORY FROM BACKEND DATA
        // ============================================
        function renderHistory(transactions) {
            const historyDiv = document.getElementById('p2pHistory');
            
            if (!transactions || transactions.length === 0) {
                historyDiv.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-history"></i>
                        <p>No P2P transactions yet</p>
                    </div>
                `;
                return;
            }

            let html = '';
            transactions.forEach(tx => {
                const date = new Date(tx.createdAt || tx.date);
                const dateStr = date.toLocaleDateString();
                const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                if (tx.type === 'sent' || tx.amount < 0) {
                    // Sent transaction
                    html += `
                        <div class="history-item">
                            <div class="history-info">
                                <div class="history-icon">
                                    <i class="fas fa-arrow-up"></i>
                                </div>
                                <div class="history-details">
                                    <div class="history-user">Sent to ${tx.recipientId || tx.to}</div>
                                    <div class="history-date">${dateStr}, ${timeStr}</div>
                                </div>
                            </div>
                            <div class="history-amount amount-sent">-$${Math.abs(tx.amount)}</div>
                        </div>
                    `;
                } else {
                    // Received transaction
                    html += `
                        <div class="history-item">
                            <div class="history-info">
                                <div class="history-icon">
                                    <i class="fas fa-arrow-down"></i>
                                </div>
                                <div class="history-details">
                                    <div class="history-user">Received from ${tx.senderId || tx.from}</div>
                                    <div class="history-date">${dateStr}, ${timeStr}</div>
                                </div>
                            </div>
                            <div class="history-amount amount-received">+$${tx.amount}</div>
                        </div>
                    `;
                }
            });
            
            historyDiv.innerHTML = html;
        }

        // ============================================
        // SEND P2P TRANSFER
        // ============================================
        async function sendP2P() {
            const recipient = document.getElementById('recipientId').value.trim();
            const amount = document.getElementById('amount').value;
            
            if (!recipient) {
                alert('Please enter recipient User ID');
                return;
            }
            
            if (!amount || amount < 1) {
                alert('Please enter valid amount');
                return;
            }

            // Get PIN
            const pins = document.querySelectorAll('.pin-field');
            let pin = '';
            pins.forEach(p => pin += p.value);
            
            if (pin.length !== 4) {
                alert('Please enter complete 4-digit PIN');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';

            try {
                const response = await fetch(`${API_URL}/p2p/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        recipientId: recipient,
                        amount: parseFloat(amount),
                        pin: pin
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ $${amount} sent to ${recipient} successfully!`);
                    
                    // Clear form
                    document.getElementById('recipientId').value = '';
                    document.getElementById('amount').value = '';
                    pins.forEach(p => p.value = '');
                    document.querySelectorAll('.pin-field')[0].focus();
                    
                    // Reload wallet balances and history
                    await loadWalletBalances();
                    await loadP2PHistory();
                } else {
                    alert('Transfer failed: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('P2P error:', error);
                alert('Transfer failed. Please try again.');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> SEND TRANSFER';
            }
        }

        // ============================================
        // PIN INPUT NAVIGATION
        // ============================================
        function moveToNext(current, index) {
            if (current.value.length === 1) {
                const next = document.querySelectorAll('.pin-field')[index + 1];
                if (next) next.focus();
            }
            
            // If backspace pressed and empty, go to previous
            current.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0) {
                    const prev = document.querySelectorAll('.pin-field')[index - 1];
                    if (prev) {
                        prev.focus();
                        prev.value = '';
                    }
                }
            }, { once: true });
        }

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function showError(message) {
            const historyDiv = document.getElementById('p2pHistory');
            historyDiv.innerHTML = `
                <div class="no-data">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>${message}</p>
                </div>
            `;
        }

        // Export functions
        window.moveToNext = moveToNext;
        window.sendP2P = sendP2P;
        window.goToDashboard = goToDashboard;
    </script>
</body>
</html>
