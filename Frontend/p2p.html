<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GAINIX AI - P2P Transfer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #03050a;
            color: #fff;
            overflow-x: hidden;
        }

        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 255, 209, 0.12), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.12), transparent 50%),
                        radial-gradient(circle at 40% 50%, rgba(139, 92, 246, 0.08), transparent 60%),
                        linear-gradient(135deg, #030507 0%, #0a121c 100%);
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 209, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 209, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 40px;
            padding: 12px 24px;
            color: #00ffd9;
            cursor: pointer;
            margin-bottom: 25px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(0, 255, 209, 0.2);
            transform: translateX(-5px);
        }

        .page-title {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #00ffd9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .p2p-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .wallet-card {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 25px;
        }

        .wallet-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .wallet-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #030507;
        }

        .wallet-info h3 {
            font-size: 18px;
            color: #8899aa;
        }

        .wallet-balance {
            font-size: 32px;
            font-weight: 700;
            color: #00ffd9;
        }

        .transfer-form {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-title {
            font-size: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #00ffd9;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #8899aa;
            font-size: 14px;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 20px;
            padding: 16px 20px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #00ffd9;
            box-shadow: 0 0 0 3px rgba(0, 255, 209, 0.1);
        }

        .input-field::placeholder {
            color: #667788;
        }

        .pin-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 25px 0;
        }

        .pin-box {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 15px;
            color: #fff;
            font-size: 24px;
            text-align: center;
            font-weight: 600;
        }

        .pin-box:focus {
            outline: none;
            border-color: #00ffd9;
            box-shadow: 0 0 0 3px rgba(0, 255, 209, 0.1);
        }

        .transfer-btn {
            width: 100%;
            background: linear-gradient(145deg, #00ffd9, #0099ff);
            border: none;
            border-radius: 40px;
            padding: 18px;
            color: #030507;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .transfer-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 209, 0.4);
        }

        .transfer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .history-section {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 209, 0.2);
            border-radius: 30px;
            padding: 25px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-title {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ffd9;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 209, 0.1);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .history-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, rgba(0, 255, 209, 0.2), rgba(0, 153, 255, 0.2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffd9;
        }

        .history-details {
            font-size: 14px;
        }

        .history-user {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .history-date {
            font-size: 11px;
            color: #8899aa;
        }

        .history-amount {
            font-weight: 700;
            font-size: 16px;
        }

        .amount-sent {
            color: #ff6b6b;
        }

        .amount-received {
            color: #2ecc71;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #8899aa;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 12, 20, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 209, 0.2);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px 0 18px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #8899aa;
            font-size: 10px;
            cursor: pointer;
            padding: 6px;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active {
            color: #00ffd9;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .p2p-container {
                grid-template-columns: 1fr;
            }
            
            .pin-box {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="grid-overlay"></div>

    <div class="dashboard">
        <!-- Back Button -->
        <div class="back-btn" onclick="window.location.href='dashboard.html'">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>

        <!-- Page Title -->
        <div class="page-title">
            <i class="fas fa-handshake"></i> P2P Transfer
        </div>

        <!-- Wallet Cards -->
        <div class="p2p-container">
            <div class="wallet-card">
                <div class="wallet-header">
                    <div class="wallet-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div class="wallet-info">
                        <h3>Fund Wallet</h3>
                        <div class="wallet-balance" id="fundWallet">$5,000</div>
                    </div>
                </div>
            </div>

            <div class="wallet-card">
                <div class="wallet-header">
                    <div class="wallet-icon">
                        <i class="fas fa-arrow-up"></i>
                    </div>
                    <div class="wallet-info">
                        <h3>Withdraw Wallet</h3>
                        <div class="wallet-balance" id="withdrawWallet">$2,346</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transfer Form -->
        <div class="transfer-form">
            <div class="form-title">
                <i class="fas fa-paper-plane"></i> Send P2P Transfer
            </div>

            <div class="input-group">
                <label class="input-label">Recipient User ID</label>
                <input type="text" id="recipientId" class="input-field" placeholder="Enter GAINIX AI ID (e.g., Gainix100002)">
            </div>

            <div class="input-group">
                <label class="input-label">Amount ($)</label>
                <input type="number" id="amount" class="input-field" placeholder="Enter amount" min="1">
            </div>

            <div class="input-group">
                <label class="input-label">Enter 4-digit PIN</label>
                <div class="pin-container">
                    <input type="password" class="pin-box" maxlength="1" onkeyup="moveToNext(this, 0)">
                    <input type="password" class="pin-box" maxlength="1" onkeyup="moveToNext(this, 1)">
                    <input type="password" class="pin-box" maxlength="1" onkeyup="moveToNext(this, 2)">
                    <input type="password" class="pin-box" maxlength="1" onkeyup="moveToNext(this, 3)">
                </div>
            </div>

            <button class="transfer-btn" onclick="sendP2P()">
                <i class="fas fa-paper-plane"></i> SEND TRANSFER
            </button>
        </div>

        <!-- Transaction History -->
        <div class="history-section">
            <div class="history-header">
                <div class="history-title">
                    <i class="fas fa-history"></i> Recent P2P Transactions
                </div>
            </div>

            <div class="history-list" id="p2pHistory">
                <div class="history-item">
                    <div class="history-info">
                        <div class="history-icon">
                            <i class="fas fa-arrow-up"></i>
                        </div>
                        <div class="history-details">
                            <div class="history-user">Sent to Gainix100003</div>
                            <div class="history-date">Today, 10:30 AM</div>
                        </div>
                    </div>
                    <div class="history-amount amount-sent">-$100</div>
                </div>

                <div class="history-item">
                    <div class="history-info">
                        <div class="history-icon">
                            <i class="fas fa-arrow-down"></i>
                        </div>
                        <div class="history-details">
                            <div class="history-user">Received from Gainix100002</div>
                            <div class="history-date">Yesterday, 3:45 PM</div>
                        </div>
                    </div>
                    <div class="history-amount amount-received">+$250</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='salary.html'"><i class="fas fa-star"></i><span>Salary</span></div>
        <div class="nav-item" onclick="window.location.href='team.html'"><i class="fas fa-users"></i><span>Team</span></div>
        <div class="nav-item active" onclick="window.location.href='p2p.html'"><i class="fas fa-handshake"></i><span>P2P</span></div>
        <div class="nav-item" onclick="window.location.href='history.html'"><i class="fas fa-history"></i><span>History</span></div>
    </div>

    <script>
        // Move to next PIN field
        function moveToNext(current, index) {
            if (current.value.length === 1) {
                const next = document.querySelectorAll('.pin-box')[index + 1];
                if (next) next.focus();
            }
        }

        // Send P2P transfer
        function sendP2P() {
            const recipient = document.getElementById('recipientId').value;
            const amount = document.getElementById('amount').value;
            
            if (!recipient) {
                alert('Please enter recipient User ID');
                return;
            }
            
            if (!amount || amount < 1) {
                alert('Please enter valid amount');
                return;
            }

            // Get PIN
            const pins = document.querySelectorAll('.pin-box');
            let pin = '';
            pins.forEach(p => pin += p.value);
            
            if (pin.length !== 4) {
                alert('Please enter complete 4-digit PIN');
                return;
            }

            alert(`✅ Transfer of $${amount} to ${recipient} initiated!`);
            
            // Clear form
            document.getElementById('recipientId').value = '';
            document.getElementById('amount').value = '';
            pins.forEach(p => p.value = '');
            
            // Add to history (demo)
            addToHistory(recipient, amount);
        }

        // Add to history (demo)
        function addToHistory(recipient, amount) {
            const historyDiv = document.getElementById('p2pHistory');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const newItem = document.createElement('div');
            newItem.className = 'history-item';
            newItem.innerHTML = `
                <div class="history-info">
                    <div class="history-icon">
                        <i class="fas fa-arrow-up"></i>
                    </div>
                    <div class="history-details">
                        <div class="history-user">Sent to ${recipient}</div>
                        <div class="history-date">Today, ${timeStr}</div>
                    </div>
                </div>
                <div class="history-amount amount-sent">-$${amount}</div>
            `;
            
            historyDiv.prepend(newItem);
        }

        // Load user data
        document.addEventListener('DOMContentLoaded', function() {
            const userStr = localStorage.getItem('user');
            if (userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('fundWallet').innerText = '$' + (user.fundWallet || 5000).toLocaleString();
                document.getElementById('withdrawWallet').innerText = '$' + (user.withdrawWallet || 2346).toLocaleString();
            }
        });
    </script>
</body>
</html>
